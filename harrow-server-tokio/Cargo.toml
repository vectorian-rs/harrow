[package]
name = "harrow-server-tokio"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Hyper server binding for Harrow: connection handling, graceful shutdown"

[features]
default = []
tls = ["hyper-rustls", "rustls"]
profiling = []

[dependencies]
harrow-core = { workspace = true }
bytes = { workspace = true }
http = { workspace = true }
http-body = "1"
http-body-util = { workspace = true }
hyper = { workspace = true }
futures-util = { workspace = true }
hyper-util = { workspace = true }
pin-project-lite = { workspace = true }
tokio = { workspace = true }
tracing = { workspace = true }

# Optional TLS
hyper-rustls = { version = "0.27", optional = true }
rustls = { version = "0.23", optional = true }

[dev-dependencies]
harrow-core = { workspace = true }
harrow-middleware = { workspace = true, features = ["timeout", "o11y", "body-limit", "rate-limit", "session", "catch-panic"] }
harrow-o11y = { workspace = true }
bytes = { workspace = true }
http-body-util = { workspace = true }
hyper = { workspace = true, features = ["client"] }
hyper-util = { workspace = true }
tokio = { workspace = true }
tracing-subscriber = { workspace = true }
