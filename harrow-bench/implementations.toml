[[implementation]]
id = "harrow-tokio-dev"
image = "harrow-perf-server:arm64-0.9.4"
build_task = "docker:dev-arm64:harrow-perf-server"
command = "/harrow-perf-server --bind 0.0.0.0 --port {{ port }}"
framework = "harrow"
backend = "tokio"
profile = "dev"
health_path = "/health"
platform = "linux/arm64"

