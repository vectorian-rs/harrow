# Naming: {framework}-{io}-{profile}-{allocator}-{version}
# Image:  harrow-bench:prod-{allocator} (all 6 framework binaries in one image)

# =============================================================================
# mimalloc
# =============================================================================

[[implementation]]
id = "harrow-tokio-prod-mimalloc-${HARROW_VERSION}"
image = "harrow-bench:prod-mimalloc-${HARROW_VERSION}"
command = "/usr/local/bin/harrow-perf-server --bind 0.0.0.0 --port {{ port }}"
framework = "harrow"
backend = "tokio"
profile = "prod"
health_path = "/health"
platform = "linux/arm64"

