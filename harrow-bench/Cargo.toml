[package]
name = "harrow-bench"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Benchmarks and load driver for Harrow"

[dependencies]
harrow = { path = "../harrow" }
harrow-core = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
http = { workspace = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }

[[bench]]
name = "echo"
harness = false

[[bench]]
name = "middleware_chain"
harness = false

[[bench]]
name = "full_stack"
harness = false

[[bench]]
name = "route_groups"
harness = false
