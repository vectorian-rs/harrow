[package]
name = "harrow-bench"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Benchmarks and load driver for Harrow"

[dependencies]
harrow = { path = "../harrow" }
harrow-core = { workspace = true }
axum = { workspace = true }
tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
http = { workspace = true }

[dev-dependencies]
criterion = { version = "0.5", features = ["async_tokio"] }
matchit = { workspace = true }

[[bin]]
name = "harrow-server"
path = "src/bin/harrow_server.rs"

[[bin]]
name = "axum-server"
path = "src/bin/axum_server.rs"

[[bin]]
name = "compare-frameworks"
path = "src/bin/compare_frameworks.rs"

[[bin]]
name = "generate-histogram"
path = "src/bin/generate_histogram.rs"

[[bench]]
name = "echo"
harness = false

[[bench]]
name = "middleware_chain"
harness = false

[[bench]]
name = "full_stack"
harness = false

[[bench]]
name = "route_groups"
harness = false

[[bench]]
name = "axum_echo"
harness = false

[[bench]]
name = "matchit_compare"
harness = false
