[tasks."bench:run:axum-tokio-mimalloc"]
description = "Bench axum-tokio-prod-mimalloc-0.8.8"
run = "cargo run -p harrow-bench --release --bin bench-single -- --impl axum-tokio-prod-mimalloc-0.8.8 --suite harrow-bench/suites/framework-comparison.toml --registry harrow-bench/implementations.toml --mode remote --server-ssh ${BENCH_SERVER_IP} --client-ssh ${BENCH_CLIENT_IP} --server-private-ip ${BENCH_SERVER_PRIVATE_IP} --no-build-missing --duration 30 --warmup 5"

