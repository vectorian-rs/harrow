[env]
_.python.venv = { path = ".venv", create = true }

[settings]
experimental = true

[tools]
rust = "1.91.1"
python = "3.13.7"
terraform = "latest"
uv = "0.8.19"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy with warnings as errors"
run = "cargo clippy --workspace -- -D warnings"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run fmt + clippy"
depends = ["fmt", "clippy"]

[tasks.verify]
description = "Run fmt, clippy, and tests"
depends = ["fmt", "clippy", "test"]

[tasks.ci]
description = "Run full CI pipeline (fmt, clippy, test)"
depends = ["verify"]

[tasks."docker:prod-arm64:harrow-server"]
description = "Build prod ARM64 harrow-server image"
run = "docker build --provenance=false -t harrow-server:prod-arm64 -f prod.arm64.Dockerfile --target harrow-server ."

[tasks."docker:prod-arm64:axum-server"]
description = "Build prod ARM64 axum-server image"
run = "docker build --provenance=false -t axum-server:prod-arm64 -f prod.arm64.Dockerfile --target axum-server ."

[tasks."docker:prod-arm64:harrow-perf-server"]
description = "Build prod ARM64 harrow-perf-server image"
run = "docker build --provenance=false -t harrow-perf-server:prod-arm64 -f prod.arm64.Dockerfile --target harrow-perf-server ."

[tasks."docker:prod-arm64:axum-perf-server"]
description = "Build prod ARM64 axum-perf-server image"
run = "docker build --provenance=false -t axum-perf-server:prod-arm64 -f prod.arm64.Dockerfile --target axum-perf-server ."

[tasks."docker:prod-arm64"]
description = "Build all prod ARM64 Docker images"
depends = [
  "docker:prod-arm64:harrow-server",
  "docker:prod-arm64:axum-server",
  "docker:prod-arm64:harrow-perf-server",
  "docker:prod-arm64:axum-perf-server",
]

[tasks."docker:dev-arm64:harrow-server"]
description = "Build dev ARM64 harrow-server image"
run = "docker build --provenance=false -t harrow-server:dev-arm64 -f dev.arm64.Dockerfile --target harrow-server ."

[tasks."docker:dev-arm64:axum-server"]
description = "Build dev ARM64 axum-server image"
run = "docker build --provenance=false -t axum-server:dev-arm64 -f dev.arm64.Dockerfile --target axum-server ."

[tasks."docker:dev-arm64:harrow-perf-server"]
description = "Build dev ARM64 harrow-perf-server image"
run = "docker build --provenance=false -t harrow-perf-server:dev-arm64 -f dev.arm64.Dockerfile --target harrow-perf-server ."

[tasks."docker:dev-arm64:axum-perf-server"]
description = "Build dev ARM64 axum-perf-server image"
run = "docker build --provenance=false -t axum-perf-server:dev-arm64 -f dev.arm64.Dockerfile --target axum-perf-server ."

[tasks."docker:dev-arm64"]
description = "Build all dev ARM64 Docker images"
depends = [
  "docker:dev-arm64:harrow-server",
  "docker:dev-arm64:axum-server",
  "docker:dev-arm64:harrow-perf-server",
  "docker:dev-arm64:axum-perf-server",
]

[tasks."docker:perf-arm64:harrow-perf-server"]
description = "Build perf ARM64 harrow-perf-server image"
run = "docker build --provenance=false -t harrow-perf-server:perf-arm64 -f perf.arm64.Dockerfile --target harrow-perf-server ."

[tasks."docker:perf-arm64:axum-perf-server"]
description = "Build perf ARM64 axum-perf-server image"
run = "docker build --provenance=false -t axum-perf-server:perf-arm64 -f perf.arm64.Dockerfile --target axum-perf-server ."

[tasks."docker:perf-arm64"]
description = "Build perf ARM64 Docker images"
depends = [
  "docker:perf-arm64:harrow-perf-server",
  "docker:perf-arm64:axum-perf-server",
]

[tasks."docker:all"]
description = "Build all ARM64 Docker images"
depends = ["docker:prod-arm64", "docker:dev-arm64"]

[tasks."bench:infra-up"]
description = "Create EC2 spot instances for benchmarking"
dir = "infra/ec2-spot"
run = "terraform apply -var key_name=harrow-bench"

[tasks."bench:infra-down"]
description = "Destroy EC2 spot instances"
dir = "infra/ec2-spot"
run = "terraform destroy -var key_name=harrow-bench"

[tasks."bench:ecr-push"]
description = "Push prod bench images to ECR"
run = """
VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
ECR=529001354082.dkr.ecr.eu-west-1.amazonaws.com
aws ecr get-login-password --region eu-west-1 --profile datadeft-dev | docker login --username AWS --password-stdin $ECR
docker tag harrow-perf-server:prod-arm64 $ECR/harrow/harrow-perf-server:$VERSION && docker push $ECR/harrow/harrow-perf-server:$VERSION
docker tag axum-perf-server:prod-arm64 $ECR/harrow/axum-perf-server:$VERSION && docker push $ECR/harrow/axum-perf-server:$VERSION
docker tag spinr:latest $ECR/harrow/spinr:$VERSION && docker push $ECR/harrow/spinr:$VERSION
"""

[tasks."bench:ecr-push-perf"]
description = "Push perf-profiling bench images to ECR"
run = """
VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
ECR=529001354082.dkr.ecr.eu-west-1.amazonaws.com
aws ecr get-login-password --region eu-west-1 --profile datadeft-dev | docker login --username AWS --password-stdin $ECR
docker tag harrow-perf-server:perf-arm64 $ECR/harrow/harrow-perf-server:$VERSION && docker push $ECR/harrow/harrow-perf-server:$VERSION
docker tag axum-perf-server:perf-arm64 $ECR/harrow/axum-perf-server:$VERSION && docker push $ECR/harrow/axum-perf-server:$VERSION
docker tag spinr:latest $ECR/harrow/spinr:$VERSION && docker push $ECR/harrow/spinr:$VERSION
"""

[tasks."bench:pull-images"]
description = "Pull versioned bench images from ECR on all instances"
run = """
VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
cd infra/ansible && ansible-playbook playbooks/pull-images.yml --extra-vars "image_version=$VERSION"
"""

[tasks."bench:setup-linux"]
description = "Provision bench EC2 instances via Ansible"
run = """
VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\\(.*\\)"/\\1/')
cd infra/ansible && ansible-playbook playbooks/bench.yml --extra-vars "image_version=$VERSION"
"""

[tasks."bench:run"]
description = "Run remote perf test against bench instances"
run = """
cargo run -p harrow-bench --bin harrow-remote-perf-test -- \
    --server-ssh {{env.BENCH_SERVER_IP}} \
    --client-ssh {{env.BENCH_CLIENT_IP}} \
    --server-private {{env.BENCH_SERVER_PRIVATE_IP}} \
    --instance-type c8g.12xlarge \
    --duration 60 \
    --warmup 5 \
    --os-monitors \
    --test-case text-c128 \
    --test-case json-1kb-c128
"""

[tasks."bench:run".env]
BENCH_SERVER_IP = "63.33.64.12"
BENCH_CLIENT_IP = "54.194.23.97"
BENCH_SERVER_PRIVATE_IP = "172.31.1.247"
