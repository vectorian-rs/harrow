[env]
_.python.venv = { path = ".venv", create = true }
HARROW_VERSION = "0.10.0"
AWS_PROFILE = "datadeft-dev"
ECR = "529001354082.dkr.ecr.eu-west-1.amazonaws.com"
SPINR_VERSION = "0.5.1"
WRK3_VERSION = "0.2.0"
BENCH_SERVER_IP = "54.195.57.93"
BENCH_CLIENT_IP = "108.131.38.135"
BENCH_SERVER_PRIVATE_IP = "172.31.13.46"

[settings]
experimental = true

[tools]
rust = "1.91.1"
python = "3.13.7"
terraform = "latest"
uv = "0.8.19"
"github:can1357/oh-my-pi" = "latest"

[tasks.fmt]
description = "Check formatting"
run = "cargo fmt --all -- --check"

[tasks.clippy]
description = "Run clippy with warnings as errors"
run = "cargo clippy --workspace -- -D warnings"

[tasks.test]
description = "Run all workspace tests"
run = "cargo test --workspace"

[tasks.lint]
description = "Run fmt + clippy"
depends = ["fmt", "clippy"]

[tasks.verify]
description = "Run fmt, clippy, and tests"
depends = ["fmt", "clippy", "test"]

[tasks."fuzz:check"]
description = "Build all HTTP correctness fuzz crates"
run = """
cargo check --manifest-path harrow-core/fuzz/Cargo.toml
cargo check --manifest-path harrow-middleware/fuzz/Cargo.toml
cargo check --manifest-path harrow-codec-h1/fuzz/Cargo.toml
"""

[tasks."fuzz:core:query"]
description = "Run query-string fuzzing"
run = "cargo fuzz run --manifest-path harrow-core/fuzz/Cargo.toml fuzz_query_parsing"

[tasks."fuzz:core:path"]
description = "Run path-matching fuzzing"
run = "cargo fuzz run --manifest-path harrow-core/fuzz/Cargo.toml fuzz_path_matching"

[tasks."fuzz:middleware:accept-encoding"]
description = "Run Accept-Encoding fuzzing through compression middleware"
run = "cargo fuzz run --manifest-path harrow-middleware/fuzz/Cargo.toml fuzz_accept_encoding"

[tasks."fuzz:codec:parse-request"]
description = "Run HTTP/1 request parser fuzzing"
run = "cargo fuzz run --manifest-path harrow-codec-h1/fuzz/Cargo.toml fuzz_parse_request"

[tasks."fuzz:codec:chunked-decode"]
description = "Run HTTP/1 chunked-decoder fuzzing"
run = "cargo fuzz run --manifest-path harrow-codec-h1/fuzz/Cargo.toml fuzz_chunked_decode"

[tasks."fuzz:codec:response-head"]
description = "Run HTTP/1 response-head fuzzing"
run = "cargo fuzz run --manifest-path harrow-codec-h1/fuzz/Cargo.toml fuzz_response_head"

[tasks."fuzz:codec:payload-decoder"]
description = "Run HTTP/1 payload-decoder fuzzing"
run = "cargo fuzz run --manifest-path harrow-codec-h1/fuzz/Cargo.toml fuzz_payload_decoder"

[tasks.ci]
description = "Run full CI pipeline (fmt, clippy, test)"
depends = ["verify"]

[tasks."docker:prod-arm64:mimalloc"]
description = "Build prod ARM64 image with mimalloc (all frameworks)"
run = "docker build --provenance=false -t harrow-bench:prod-mimalloc-${HARROW_VERSION} -f docker/tokio.prod.arm64.Dockerfile --target prod-mimalloc ."

[tasks."docker:prod-arm64:jemalloc"]
description = "Build prod ARM64 image with jemalloc (all frameworks)"
run = "docker build --provenance=false -t harrow-bench:prod-jemalloc-${HARROW_VERSION} -f docker/tokio.prod.arm64.Dockerfile --target prod-jemalloc ."

[tasks."docker:prod-arm64:sysalloc"]
description = "Build prod ARM64 image with system allocator (all frameworks)"
run = "docker build --provenance=false -t harrow-bench:prod-sysalloc-${HARROW_VERSION} -f docker/tokio.prod.arm64.Dockerfile --target prod-sysalloc ."

[tasks."docker:prod-arm64"]
description = "Build all prod ARM64 Docker images"
depends = [
  "docker:prod-arm64:mimalloc",
  "docker:prod-arm64:jemalloc",
  "docker:prod-arm64:sysalloc",
]

[tasks."docker:dev-arm64:harrow-server-tokio"]
description = "Build dev ARM64 harrow-server-tokio image"
run = "docker build --provenance=false -t harrow-server-tokio:dev-arm64 -f docker/tokio.dev.arm64.Dockerfile --target harrow-server-tokio ."

[tasks."docker:dev-arm64:axum-server"]
description = "Build dev ARM64 axum-server image"
run = "docker build --provenance=false -t axum-server:dev-arm64 -f docker/tokio.dev.arm64.Dockerfile --target axum-server ."

[tasks."docker:dev-arm64:harrow-perf-server"]
description = "Build dev ARM64 harrow-perf-server image"
run = "docker build --provenance=false -t harrow-perf-server:dev-arm64 -f docker/tokio.dev.arm64.Dockerfile --target harrow-perf-server ."

[tasks."docker:dev-arm64:axum-perf-server"]
description = "Build dev ARM64 axum-perf-server image"
run = "docker build --provenance=false -t axum-perf-server:dev-arm64 -f docker/tokio.dev.arm64.Dockerfile --target axum-perf-server ."

[tasks."docker:dev-arm64"]
description = "Build all dev ARM64 Docker images"
depends = [
  "docker:dev-arm64:harrow-server-tokio",
  "docker:dev-arm64:axum-server",
  "docker:dev-arm64:harrow-perf-server",
  "docker:dev-arm64:axum-perf-server",
]

[tasks."docker:perf-arm64:harrow-perf-server"]
description = "Build perf ARM64 harrow-perf-server image"
run = "docker build --provenance=false -t harrow-perf-server:perf-arm64 -f docker/tokio.perf.arm64.Dockerfile --target harrow-perf-server ."

[tasks."docker:perf-arm64:ntex-perf-server"]
description = "Build perf ARM64 ntex-perf-server image"
run = "docker build --provenance=false -t ntex-perf-server:perf-arm64 -f docker/tokio.perf.arm64.Dockerfile --target ntex-perf-server ."

[tasks."docker:perf-arm64"]
description = "Build all perf ARM64 Docker images (profiling tools run on host)"
depends = [
  "docker:perf-arm64:harrow-perf-server",
  "docker:perf-arm64:ntex-perf-server",
]

[tasks."docker:prod-arm64:harrow-server-monoio"]
description = "Build prod ARM64 monoio server image (io_uring)"
run = "docker build --provenance=false -t harrow-server-monoio:prod-arm64 -f docker/monoio.arm64.Dockerfile ."

[tasks."docker:dev-arm64:harrow-server-monoio"]
description = "Build dev ARM64 monoio server image (io_uring)"
run = "docker build --provenance=false -t harrow-server-monoio:dev-arm64 -f docker/monoio.arm64.Dockerfile --build-arg BUILD_PROFILE=dev --build-arg BINARY_DIR=debug ."

[tasks."docker:perf-arm64:harrow-server-monoio"]
description = "Build perf ARM64 monoio server image (io_uring with debug symbols)"
run = "docker build --provenance=false -t harrow-server-monoio:perf-arm64 -f docker/monoio.arm64.Dockerfile --build-arg BUILD_PROFILE=perf --build-arg BINARY_DIR=perf ."

[tasks."docker:loadgen:spinr"]
description = "Build ARM64 spinr load generator image"
run = "docker build --provenance=false --platform linux/arm64 -t spinr:arm64 -f infra/load-generators/spinr.arm64.Dockerfile infra/load-generators"

[tasks."docker:loadgen:wrk3"]
description = "Build ARM64 wrk3 load generator image"
run = "docker build --provenance=false --platform linux/arm64 -t wrk3:arm64 -f infra/load-generators/wrk3.Dockerfile infra/load-generators"

[tasks."docker:loadgen:all"]
description = "Build all load generator images (spinr, wrk3)"
depends = ["docker:loadgen:spinr", "docker:loadgen:wrk3"]

[tasks."docker:all"]
description = "Build all ARM64 Docker images"
depends = ["docker:prod-arm64", "docker:dev-arm64", "docker:prod-arm64:harrow-server-monoio"]

[tasks."bench:infra-bootstrap"]
description = "Initialize Terraform and provision base infra plus EC2 spot instances"
run = """
terraform -chdir=infra/base-infra init
terraform -chdir=infra/base-infra apply -auto-approve
terraform -chdir=infra/ec2-spot init
terraform -chdir=infra/ec2-spot apply -auto-approve -var key_name=harrow-bench
"""

[tasks."bench:infra-up"]
description = "Create EC2 spot instances for benchmarking (assumes initialized Terraform and existing base infra)"
dir = "infra/ec2-spot"
run = "terraform apply -auto-approve -var key_name=harrow-bench"

[tasks."bench:infra-down"]
description = "Destroy EC2 spot instances"
dir = "infra/ec2-spot"
run = "terraform destroy -auto-approve -var key_name=harrow-bench"

[tasks."bench:inventory"]
description = "Write Terraform EC2 inventory to infra/ansible/inventory.ini"
run = "terraform -chdir=infra/ec2-spot output -raw ansible_inventory > infra/ansible/inventory.ini"

[tasks."bench:ecr-login"]
description = "Login to ECR"
run = "aws ecr get-login-password --region eu-west-1 | docker login --username AWS --password-stdin https://${ECR}"

[tasks."bench:ecr-push:prod-mimalloc"]
description = "Push prod-mimalloc image to ECR"
depends = ["bench:ecr-login"]
run = "docker tag harrow-bench:prod-mimalloc-${HARROW_VERSION} ${ECR}/harrow/harrow-bench:prod-mimalloc-${HARROW_VERSION} && docker push ${ECR}/harrow/harrow-bench:prod-mimalloc-${HARROW_VERSION}"

[tasks."bench:ecr-push:prod-jemalloc"]
description = "Push prod-jemalloc image to ECR"
depends = ["bench:ecr-login"]
run = "docker tag harrow-bench:prod-jemalloc-${HARROW_VERSION} ${ECR}/harrow/harrow-bench:prod-jemalloc-${HARROW_VERSION} && docker push ${ECR}/harrow/harrow-bench:prod-jemalloc-${HARROW_VERSION}"

[tasks."bench:ecr-push:prod-sysalloc"]
description = "Push prod-sysalloc image to ECR"
depends = ["bench:ecr-login"]
run = "docker tag harrow-bench:prod-sysalloc-${HARROW_VERSION} ${ECR}/harrow/harrow-bench:prod-sysalloc-${HARROW_VERSION} && docker push ${ECR}/harrow/harrow-bench:prod-sysalloc-${HARROW_VERSION}"

[tasks."bench:ecr-push:harrow-monoio"]
description = "Push harrow-server-monoio to ECR"
depends = ["bench:ecr-login"]
run = "docker tag harrow-server-monoio:prod-arm64 ${ECR}/harrow/harrow-server-monoio:${HARROW_VERSION} && docker push ${ECR}/harrow/harrow-server-monoio:${HARROW_VERSION}"

[tasks."bench:ecr-push:spinr"]
description = "Push spinr to ECR"
depends = ["bench:ecr-login"]
run = "docker tag spinr:arm64 ${ECR}/harrow/load-generators:spinr-v${SPINR_VERSION} && docker push ${ECR}/harrow/load-generators:spinr-v${SPINR_VERSION}"

[tasks."bench:ecr-push:wrk3"]
description = "Push wrk3 to ECR"
depends = ["bench:ecr-login"]
run = "docker tag wrk3:arm64 ${ECR}/harrow/load-generators:wrk3-v${WRK3_VERSION} && docker push ${ECR}/harrow/load-generators:wrk3-v${WRK3_VERSION}"

[tasks."bench:ecr-push:perf-harrow"]
description = "Push perf harrow image to ECR"
depends = ["bench:ecr-login"]
run = "docker tag harrow-perf-server:perf-arm64 $ECR/harrow/harrow-perf-server:perf-$HARROW_VERSION && docker push $ECR/harrow/harrow-perf-server:perf-$HARROW_VERSION"

[tasks."bench:ecr-push:perf-ntex"]
description = "Push perf ntex image to ECR"
depends = ["bench:ecr-login"]
run = "docker tag ntex-perf-server:perf-arm64 $ECR/harrow/ntex-perf-server:perf-$HARROW_VERSION && docker push $ECR/harrow/ntex-perf-server:perf-$HARROW_VERSION"

[tasks."bench:ecr-push-all"]
description = "Push all bench images to ECR"
depends = [
  "bench:ecr-push:prod-mimalloc",
  "bench:ecr-push:prod-jemalloc",
  "bench:ecr-push:prod-sysalloc",
  "bench:ecr-push:harrow-monoio",
  "bench:ecr-push:spinr",
  "bench:ecr-push:wrk3",
]

[tasks."bench:build-push-loadgen"]
description = "Build and push load generator images to ECR"
depends = ["docker:loadgen:all", "bench:ecr-push:spinr", "bench:ecr-push:wrk3"]

[tasks."bench:pull-images"]
description = "Pull versioned bench images from ECR on all instances"
run = """
cd infra/ansible && ansible-playbook playbooks/pull-images.yml --extra-vars "harrow_version=$HARROW_VERSION spinr_version=$SPINR_VERSION"
"""

[tasks."bench:setup-linux"]
description = "Provision bench EC2 instances via Ansible"
run = """
cd infra/ansible && ansible-playbook playbooks/bench.yml --extra-vars "harrow_version=$HARROW_VERSION spinr_version=$SPINR_VERSION"
"""


[tasks."bench:baseline:harrow"]
description = "Run harrow baseline (spinr only, no profiling)"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework harrow --backend tokio --allocator mimalloc \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:baseline:ntex"]
description = "Run ntex baseline (spinr only, no profiling)"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework ntex --backend tokio --allocator mimalloc \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:baseline:all"]
description = "Run baseline for both harrow and ntex (no profiling)"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework harrow --backend tokio --allocator mimalloc \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml

cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework ntex --backend tokio --allocator mimalloc \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:perf:harrow"]
description = "Run perf capture for harrow (spinr + perf record + strace)"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework harrow --backend tokio --allocator mimalloc \
  --perf --perf-mode both \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:perf:ntex"]
description = "Run perf capture for ntex (spinr + perf record + strace)"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework ntex --backend tokio --allocator mimalloc \
  --perf --perf-mode both \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:perf:all"]
description = "Run perf capture for both harrow and ntex sequentially"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework harrow --backend tokio --allocator mimalloc \
  --perf --perf-mode both \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml

cargo run -p harrow-bench --release --bin harrow-remote-perf-test -- \
  --mode remote --server-ssh $BENCH_SERVER_IP --client-ssh $BENCH_CLIENT_IP \
  --server-private $BENCH_SERVER_PRIVATE_IP --instance-type c8gn.12xlarge \
  --framework ntex --backend tokio --allocator mimalloc \
  --perf --perf-mode both \
  --duration 30 --warmup 5 \
  --config harrow-bench/spinr/text-c128.toml
"""

[tasks."bench:compare:harrow-vs-ntex"]
description = "Compare Harrow Tokio vs ntex Tokio across the framework-comparison suite"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
cargo run -p harrow-bench --release --bin bench-compare -- \
  --left harrow-tokio-prod-mimalloc-${HARROW_VERSION} \
  --right ntex-tokio-prod-mimalloc-3.7.2 \
  --suite harrow-bench/suites/framework-comparison.toml \
  --registry harrow-bench/implementations.toml \
  --mode remote \
  --server-ssh ${BENCH_SERVER_IP} \
  --client-ssh ${BENCH_CLIENT_IP} \
  --server-private-ip ${BENCH_SERVER_PRIVATE_IP} \
  --no-build-missing \
  --duration 30 \
  --warmup 5
"""

[tasks."bench:run:runtime-matrix"]
description = "Run the 5-way runtime matrix: Harrow Tokio/Monoio/Meguri vs ntex Tokio/Compio"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
IMPLS="harrow-tokio-prod-mimalloc-${HARROW_VERSION}
harrow-monoio-prod-mimalloc-${HARROW_VERSION}
harrow-meguri-prod-mimalloc-${HARROW_VERSION}
ntex-tokio-prod-mimalloc-3.7.2
ntex-compio-prod-mimalloc-3.7.2"

for IMPL in $IMPLS; do
  echo "========== ${IMPL} =========="
  cargo run -p harrow-bench --release --bin bench-single -- \
    --impl "${IMPL}" \
    --suite harrow-bench/suites/framework-comparison.toml \
    --registry harrow-bench/implementations.toml \
    --mode remote \
    --server-ssh ${BENCH_SERVER_IP} \
    --client-ssh ${BENCH_CLIENT_IP} \
    --server-private-ip ${BENCH_SERVER_PRIVATE_IP} \
    --no-build-missing \
    --duration 30 \
    --warmup 5
  echo ""
done
"""

[tasks."bench:verify"]
description = "Verify OS tuning and local image tags on both bench nodes from the generated inventory"
run = "bash infra/scripts/verify-bench.sh infra/ansible/inventory.ini"

# Run all 21 implementations sequentially.
# Runs all 21 implementations sequentially (one at a time — they share the same server)
[tasks."bench:run:all"]
description = "Run all implementations against framework-comparison suite"
run = """
eval "$(bash infra/scripts/bench-addresses.sh --exports)"
IMPLS="harrow-tokio-prod-mimalloc-${HARROW_VERSION}
harrow-tokio-prod-jemalloc-${HARROW_VERSION}
harrow-tokio-prod-sysalloc-${HARROW_VERSION}
harrow-monoio-prod-mimalloc-${HARROW_VERSION}
harrow-meguri-prod-mimalloc-${HARROW_VERSION}
axum-tokio-prod-mimalloc-0.8.8
axum-tokio-prod-jemalloc-0.8.8
axum-tokio-prod-sysalloc-0.8.8
tako-tokio-prod-mimalloc-1.1.1
tako-tokio-prod-jemalloc-1.1.1
tako-tokio-prod-sysalloc-1.1.1
salvo-tokio-prod-mimalloc-0.90.1
salvo-tokio-prod-jemalloc-0.90.1
salvo-tokio-prod-sysalloc-0.90.1
warp-tokio-prod-mimalloc-0.4.2
warp-tokio-prod-jemalloc-0.4.2
warp-tokio-prod-sysalloc-0.4.2
ntex-tokio-prod-mimalloc-3.7.2
ntex-tokio-prod-jemalloc-3.7.2
ntex-tokio-prod-sysalloc-3.7.2
ntex-compio-prod-mimalloc-3.7.2"

for IMPL in $IMPLS; do
  echo "========== ${IMPL} =========="
  cargo run -p harrow-bench --release --bin bench-single -- \
    --impl "${IMPL}" \
    --suite harrow-bench/suites/framework-comparison.toml \
    --registry harrow-bench/implementations.toml \
    --mode remote \
    --server-ssh ${BENCH_SERVER_IP} \
    --client-ssh ${BENCH_CLIENT_IP} \
    --server-private-ip ${BENCH_SERVER_PRIVATE_IP} \
    --no-build-missing \
    --duration 30 \
    --warmup 5
  echo ""
done
"""

[tasks."bench:run:harrow-tokio-mimalloc"]
description = "Bench Harrow Tokio mimalloc"
run = "cargo run -p harrow-bench --release --bin bench-single -- --impl harrow-tokio-prod-mimalloc-${HARROW_VERSION} --suite harrow-bench/suites/framework-comparison.toml --registry harrow-bench/implementations.toml --mode remote --server-ssh ${BENCH_SERVER_IP} --client-ssh ${BENCH_CLIENT_IP} --server-private-ip ${BENCH_SERVER_PRIVATE_IP} --no-build-missing --duration 30 --warmup 5"

