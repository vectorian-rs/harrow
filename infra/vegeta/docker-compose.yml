version: "3.8"

services:
  # Tokio backend server
  tokio-server:
    build:
      context: ../..
      dockerfile: infra/vegeta/server-tokio.Dockerfile
      args:
        - BUILDKIT_SBOM_SCAN_STAGE=false
    image: harrow-tokio-server:latest
    ports:
      - "3000:3000"
    environment:
      - BIND_ADDR=0.0.0.0:3000
      - RUST_LOG=info
    networks:
      - vegeta-test
    # Healthcheck using TCP connection since distroless has no curl
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    # Or use simple TCP healthcheck via Docker:
    # healthcheck:
    #   test: ["CMD-SHELL", "timeout 1 bash -c 'cat < /dev/null > /dev/tcp/localhost/3000'"]

  # Monoio backend server (run with --privileged for io_uring)
  monoio-server:
    build:
      context: ../..
      dockerfile: infra/vegeta/server-monoio.Dockerfile
      args:
        - BUILDKIT_SBOM_SCAN_STAGE=false
    image: harrow-monoio-server:latest
    ports:
      - "3001:3000"
    environment:
      - BIND_ADDR=0.0.0.0:3000
      - RUST_LOG=info
    networks:
      - vegeta-test
    # Uncomment for io_uring support:
    # privileged: true
    healthcheck:
      test: ["CMD", "/app/server", "--health-check"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # Vegeta load tester
  vegeta:
    image: peterevans/vegeta:latest
    depends_on:
      tokio-server:
        condition: service_healthy
    environment:
      - SERVER_URL=http://tokio-server:3000
      - DURATION=30s
      - RATE=1000
      - TARGET_DIR=/targets/docker
    volumes:
      - ./targets/docker:/targets:ro
      - ./results:/results
      - ./scripts:/scripts:ro
    networks:
      - vegeta-test
    entrypoint: ["/bin/sh"]
    command: ["/scripts/run-all-vegeta-tests.sh"]

  # Interactive vegeta shell
  vegeta-shell:
    image: peterevans/vegeta:latest
    depends_on:
      - tokio-server
    environment:
      - SERVER_URL=http://tokio-server:3000
      - TARGET_DIR=/targets/docker
    volumes:
      - ./targets/docker:/targets:ro
      - ./results:/results
      - ./scripts:/scripts:ro
    networks:
      - vegeta-test
    entrypoint: ["/bin/sh"]
    stdin_open: true
    tty: true

networks:
  vegeta-test:
    driver: bridge
