- name: Benchmark instances
  hosts: all
  vars:
    ecr_registry: "529001354082.dkr.ecr.eu-west-1.amazonaws.com"
    aws_region: "eu-west-1"
    image_version: "{{ image_version }}"
  roles:
    - role: os
    - role: packages
    - role: docker
    - role: ecr-login
    - role: pull-images
    - role: vector
