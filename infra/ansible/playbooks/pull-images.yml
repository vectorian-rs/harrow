- name: Pull latest bench images from ECR
  hosts: all
  vars:
    ecr_registry: "529001354082.dkr.ecr.eu-west-1.amazonaws.com"
    aws_region: "eu-west-1"
    harrow_version: "{{ harrow_version }}"
    spinr_version: "{{ spinr_version }}"
    wrk3_version: "{{ wrk3_version | default('0.2.0') }}"
    sysalloc_tag: "{{ sysalloc_version | default(harrow_version) }}"
  roles:
    - role: ecr-login
    - role: pull-images
