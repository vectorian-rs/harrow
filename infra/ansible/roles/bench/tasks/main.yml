# ---------------------------------------------------------------------------
# All hosts: packages + Docker + ECR login
# ---------------------------------------------------------------------------

- name: Install benchmark packages
  become: true
  ansible.builtin.package:
    name:
      - docker
      - git
      - jq
      - curl
      - gcc
      - g++
      - make
      - openssl-dev
      - pkgconf
      - aws-cli
    state: present

- name: Enable Docker at boot
  become: true
  ansible.builtin.command: rc-update add docker default
  changed_when: false

- name: Start Docker
  become: true
  ansible.builtin.command: rc-service docker start
  changed_when: false

- name: Add alpine user to docker group
  become: true
  ansible.builtin.user:
    name: alpine
    groups: docker
    append: true

- name: Reset connection for group membership
  ansible.builtin.meta: reset_connection

- name: ECR login
  ansible.builtin.shell: |
    aws ecr get-login-password --region {{ aws_region | default('eu-west-1') }} \
      | docker login --username AWS --password-stdin {{ ecr_registry }}
  changed_when: true

# ---------------------------------------------------------------------------
# Server only: pull images from ECR
# ---------------------------------------------------------------------------

- name: Pull serde-bench-server from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/serde-bench-server:latest"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Tag serde-bench-server for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/serde-bench-server:latest serde-bench-server"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Pull axum-serde-server from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/axum-serde-server:latest"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Tag axum-serde-server for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/axum-serde-server:latest axum-serde-server"
  changed_when: true
  when: inventory_hostname in groups['server']

# ---------------------------------------------------------------------------
# Client only: build bench tools
# ---------------------------------------------------------------------------

- name: Clone harrow repo
  ansible.builtin.git:
    repo: "{{ repo_url | default('https://github.com/l1x/harrow.git') }}"
    dest: ~/harrow
    version: "{{ branch | default('main') }}"
    force: true
  when: inventory_hostname in groups['client']

- name: Install Rust via rustup
  ansible.builtin.shell:
    cmd: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
    creates: ~/.cargo/bin/rustc
  when: inventory_hostname in groups['client']

- name: Build serde-bench binary
  ansible.builtin.shell:
    cmd: source ~/.cargo/env && cargo build --release --bin serde-bench
    chdir: ~/harrow
  changed_when: true
  when: inventory_hostname in groups['client']

- name: Clone mcp-load-tester
  ansible.builtin.git:
    repo: https://github.com/l1x/mcp-load-tester.git
    dest: ~/mcp-load-tester
    version: main
    force: true
  when: inventory_hostname in groups['client']

- name: Build mcp-load-tester bench binary
  ansible.builtin.shell:
    cmd: source ~/.cargo/env && cargo build --release --bin bench
    chdir: ~/mcp-load-tester
    creates: ~/mcp-load-tester/target/release/bench
  when: inventory_hostname in groups['client']

- name: Copy vector.toml config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../../infra/vector/vector.toml"
    dest: ~/vector.toml
    mode: "0644"
  when: inventory_hostname in groups['client']

- name: Pull Vector image
  ansible.builtin.command:
    cmd: docker pull timberio/vector:latest-alpine
  changed_when: true
  when: inventory_hostname in groups['client']
