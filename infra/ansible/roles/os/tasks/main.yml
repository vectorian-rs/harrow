- name: Deploy sysctl benchmark tuning
  become: true
  ansible.builtin.template:
    src: sysctl.conf.j2
    dest: /etc/sysctl.d/99-bench.conf
    owner: root
    group: root
    mode: "0644"

- name: Apply sysctl settings
  become: true
  ansible.builtin.command: sysctl -p /etc/sysctl.d/99-bench.conf
  changed_when: true

- name: Deploy file descriptor limits (PAM-based systems)
  become: true
  ansible.builtin.template:
    src: limits.conf.j2
    dest: /etc/security/limits.d/99-bench.conf
    owner: root
    group: root
    mode: "0644"

- name: Raise system-wide file descriptor limit (Alpine)
  become: true
  ansible.builtin.lineinfile:
    path: /etc/rc.conf
    regexp: "^rc_ulimit="
    line: 'rc_ulimit="-n 32000"'
    create: true

- name: Set ulimit in shell profile for SSH sessions
  become: true
  ansible.builtin.copy:
    dest: /etc/profile.d/bench-ulimit.sh
    content: "ulimit -Sn 32000 2>/dev/null; ulimit -Hn 32000 2>/dev/null\n"
    owner: root
    group: root
    mode: "0644"

- name: Apply hard limit immediately via prlimit on current shell
  become: true
  ansible.builtin.command: prlimit --nofile=32000:32000 --pid 1
  changed_when: true
  failed_when: false

- name: Install chrony
  become: true
  ansible.builtin.package:
    name: chrony
    state: present

- name: Deploy chrony configuration
  become: true
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony/chrony.conf
    owner: root
    group: root
    mode: "0644"
  notify: restart chrony

- name: Enable chronyd at boot
  become: true
  ansible.builtin.command: rc-update add chronyd default
  changed_when: false

- name: Start chronyd
  become: true
  ansible.builtin.command: rc-service chronyd start
  changed_when: false

- name: Verify NTP sources
  become: true
  ansible.builtin.command: chronyc sources
  changed_when: false
  register: chrony_sources

- name: Show NTP sources
  ansible.builtin.debug:
    var: chrony_sources.stdout_lines
