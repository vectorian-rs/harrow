- name: Enable community repository
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    regexp: '^#(.*/community)$'
    line: '\1'
    backrefs: true

- name: Add edge/testing repository for dool
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    line: "https://dl-cdn.alpinelinux.org/alpine/edge/testing"
    state: present

- name: Update apk index
  become: true
  ansible.builtin.command: apk update
  changed_when: true

- name: Install benchmark packages
  become: true
  ansible.builtin.package:
    name:
      - docker
      - jq
      - curl
      - aws-cli
    state: present

- name: Install performance monitoring tools
  become: true
  ansible.builtin.package:
    name:
      - perf
      - sysstat
      - procps-ng
      - ethtool
    state: present

- name: Check whether dool package is available
  become: true
  ansible.builtin.command: apk search -x dool
  register: dool_search
  changed_when: false
  failed_when: false

- name: Install dool when available
  become: true
  ansible.builtin.package:
    name: dool
    state: present
  when: dool_search.rc == 0 and (dool_search.stdout | trim) != ""

- name: Check if vegeta is installed
  ansible.builtin.command: which vegeta
  register: vegeta_check
  changed_when: false
  failed_when: false

- name: Install vegeta (arm64 binary)
  become: true
  ansible.builtin.shell: |
    curl -L -o /tmp/vegeta.tar.gz https://github.com/tsenart/vegeta/releases/download/v12.12.0/vegeta_12.12.0_linux_arm64.tar.gz
    cd /tmp && tar -xzf vegeta.tar.gz vegeta
    mv /tmp/vegeta /usr/local/bin/vegeta
    chmod +x /usr/local/bin/vegeta
    rm -f /tmp/vegeta.tar.gz
  when: vegeta_check.rc != 0
  changed_when: true
