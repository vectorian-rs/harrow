- name: Enable community repository
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    regexp: '^#(.*/community)$'
    line: '\1'
    backrefs: true

- name: Add edge/testing repository for dool
  become: true
  ansible.builtin.lineinfile:
    path: /etc/apk/repositories
    line: "https://dl-cdn.alpinelinux.org/alpine/edge/testing"
    state: present

- name: Update apk index
  become: true
  ansible.builtin.command: apk update
  changed_when: true

- name: Install benchmark packages
  become: true
  ansible.builtin.package:
    name:
      - docker
      - jq
      - curl
      - aws-cli
    state: present

- name: Install performance monitoring tools
  become: true
  ansible.builtin.package:
    name:
      - perf
      - strace
      - sysstat
      - procps-ng
      - ethtool
      - perl
    state: present

- name: Install FlameGraph tools (stackcollapse-perf.pl, flamegraph.pl)
  become: true
  ansible.builtin.shell: |
    if [ ! -f /usr/local/bin/stackcollapse-perf.pl ]; then
      wget -q -O /tmp/flamegraph.tar.gz https://github.com/brendangregg/FlameGraph/archive/refs/heads/master.tar.gz
      tar -xzf /tmp/flamegraph.tar.gz -C /tmp
      cp /tmp/FlameGraph-master/stackcollapse-perf.pl /usr/local/bin/
      cp /tmp/FlameGraph-master/flamegraph.pl /usr/local/bin/
      chmod +x /usr/local/bin/stackcollapse-perf.pl /usr/local/bin/flamegraph.pl
      rm -rf /tmp/flamegraph.tar.gz /tmp/FlameGraph-master
    fi
  changed_when: false

- name: Check whether dool package is available
  become: true
  ansible.builtin.command: apk search -x dool
  register: dool_search
  changed_when: false
  failed_when: false

- name: Install dool when available
  become: true
  ansible.builtin.package:
    name: dool
    state: present
  when: dool_search.rc == 0 and (dool_search.stdout | trim) != ""

