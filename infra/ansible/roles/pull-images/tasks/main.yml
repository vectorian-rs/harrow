# Server: pull prod bench images (3 allocator variants, each containing all 6 framework binaries)
- name: Pull harrow-bench prod-mimalloc from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/harrow-bench:prod-mimalloc-{{ harrow_version }}"
  changed_when: true
  failed_when: false
  when: inventory_hostname in groups['server']

- name: Tag harrow-bench prod-mimalloc for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/harrow-bench:prod-mimalloc-{{ harrow_version }} harrow-bench:prod-mimalloc-{{ harrow_version }}"
  changed_when: true
  failed_when: false
  when: inventory_hostname in groups['server']

