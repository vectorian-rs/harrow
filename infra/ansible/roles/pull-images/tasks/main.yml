# Client: build vegeta ARM64 image locally
- name: Build vegeta ARM64 image
  ansible.builtin.shell: |
    cat > /tmp/Dockerfile.vegeta << 'EOF'
    FROM alpine:3.19
    RUN apk add --no-cache ca-certificates jq bash && \
        wget -q "https://github.com/tsenart/vegeta/releases/download/v12.12.0/vegeta_12.12.0_linux_arm64.tar.gz" -O /tmp/vegeta.tar.gz && \
        tar xzf /tmp/vegeta.tar.gz -C /usr/local/bin vegeta && \
        rm /tmp/vegeta.tar.gz
    ENTRYPOINT ["vegeta"]
    CMD ["-help"]
    EOF
    docker build -t vegeta:arm64 -f /tmp/Dockerfile.vegeta /tmp
    rm -f /tmp/Dockerfile.vegeta
  changed_when: true
  when: inventory_hostname in groups['client']
