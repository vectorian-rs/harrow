# Server: pull perf server images
- name: Pull harrow-perf-server from ECR
  ansible.builtin.command:
    cmd: "docker pull {{ ecr_registry }}/harrow/harrow-perf-server:{{ harrow_version }}"
  changed_when: true
  when: inventory_hostname in groups['server']

- name: Tag harrow-perf-server for local use
  ansible.builtin.command:
    cmd: "docker tag {{ ecr_registry }}/harrow/harrow-perf-server:{{ harrow_version }} harrow-perf-server"
  changed_when: true
  when: inventory_hostname in groups['server']

